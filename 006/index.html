<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Heart Animation - Final Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Amiri&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/love.css">
</head>
<body onclick="playAudio()">

    <audio loop id="audios" preload="auto">
        <source src="MP3/1.mp3" type="audio/mpeg" />
    </audio>

    <div class="container">
        <div class="body_left">
            <img src="images/biubiubiu.gif" alt="sticker">
        </div>

        <div class="body_center love" id="love_heart">
            <div class="block">
                <div class="div1"></div><div class="div2"></div>
                <div class="div3"></div><div class="div4"></div>
            </div>
        </div>

        <div id="message-box">
            <p class="love-text">إلى أغلى إنسانة..</p>
            <p class="sub-text">مكانك في هذا القلب لا يملؤه غيرك، أنتِ أجمل ما حدث لي.</p>
        </div>

        <div id="words">I Love You</div>
    </div>

    <div class="footer">
        <div class="border">
            <div class="border-top"></div>
            <div class="border-bottom"></div>
        </div>
    </div>

    <script src="js/love.js"></script>
    <script>
        function playAudio() { document.getElementById("audios").play(); }
    </script>
</body>
</html>
